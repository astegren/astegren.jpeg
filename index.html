<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Photography Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Sports Photography Portfolio</h1>
            <p class="subtitle">Capturing the action, freezing the moment</p>
        </div>
    </header>

    <nav class="category-nav">
        <div class="container">
            <button class="category-btn active" data-category="all">All</button>
            <button class="category-btn" data-category="football">Football</button>
            <button class="category-btn" data-category="basketball">Basketball</button>
            <button class="category-btn" data-category="soccer">Soccer</button>
            <button class="category-btn" data-category="other">Other Sports</button>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="gallery" id="gallery">
                <!-- Gallery items will be dynamically inserted here -->
                <!-- Example structure for each photo:
                <div class="gallery-item" data-category="football">
                    <img src="images/photo1.jpg" alt="Sports photo">
                    <div class="photo-info">
                        <h3>Photo Title</h3>
                        <p>Brief description</p>
                    </div>
                </div>
                -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Sports Photography. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
